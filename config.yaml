# ============================================================================
# Workers — Procesos hijo de STT y TTS
workers:
  python_executable: "workers/.venv/Scripts/python.exe"
  # Script del worker de speech-to-text.
  stt_script: "workers/stt_worker.py"
  # Script del worker de text-to-speech.
  tts_script: "workers/tts_worker.py"
  # Tiempo máximo para carga/calibración de Whisper. Puede tardar en CPU.
  stt_init_timeout_secs: 60
  # Tiempo máximo para carga de Piper (más rápida que Whisper).
  tts_init_timeout_secs: 20
  # Espera antes de matar un worker a la fuerza.
  shutdown_timeout_secs: 3
  # Si true, un worker que muere se reinicia solo en vez de tumbar Jarvis.
  restart_on_crash: true
  # Máximo de reinicios por ejecución. Al agotarse, Jarvis termina.
  max_restarts: 1
# ============================================================================
#
#
#
# # ============================================================================
# Stt — Reconocimiento de voz (Speech-to-Text)
stt:
  # Motor de STT. native: PyAudio + Silero VAD + faster-whisper.
  # realtimestt: respaldo alternativo.
  engine: native

  # VAD (solo aplica con engine: native)
  vad:
    # Probabilidad de Silero para marcar inicio de voz.
    threshold: 0.3
    # Probabilidad para marcar fin de voz (histéresis anti micro-pausas).
    neg_threshold: 0.35
    # Audio previo antepuesto al detectar voz (ms).
    pre_roll_ms: 400
    # Duración mínima de voz para no descartarla como blip (ms).
    min_speech_ms: 250
    # Silencio para cerrar frase antes de long_utterance_ms (ms).
    silence_long_ms: 800
    # Silencio para cerrar frase después de long_utterance_ms (ms).
    silence_short_ms: 450
    # Umbral que activa silence_short_ms en vez de silence_long_ms (ms).
    long_utterance_ms: 2500
    # Piso de energía en dBFS. null = calibrar al arrancar.
    energy_floor_dbfs: null
    # Segundos de escucha ambiente para calcular energy_floor_dbfs.
    calibration_secs: 1.5
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Filtros anti-alucinación sobre la salida de Whisper (engine: native)
  filters:
    # Descarta si no_speech_prob lo supera.
    max_no_speech_prob: 0.6
    # Descarta si avg_logprob cae por debajo.
    min_avg_logprob: -1.0
    # Descarta si compression_ratio lo supera (texto repetitivo).
    max_compression_ratio: 2.4
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Detector de doble aplauso (engine: native)
  # Corre siempre; welcome.enabled decide si dispara la escena.
  clap:
    # dBFS mínimo del pico para considerar un posible aplauso.
    min_peak_dbfs: -30.0
    # Subida mínima sobre el fondo (bg_db) para considerarlo onset.
    min_rise_db: 7.0
    # Ventana en la que el onset debe volver a caer bajo su umbral para confirmarse (ms).
    decay_ms: 220
    # Rechaza el onset si Silero cree que es voz sonora por encima de esto.
    max_vad_prob: 0.45
    # Tasa mínima de cruces por cero (timbre de banda ancha; filtra clics de teclado/trackpad).
    min_zcr: 0.14
    # Gap mínimo entre los dos aplausos (evita contar la reverb del mismo golpe) (ms).
    double_min_gap_ms: 150
    # Gap máximo entre los dos aplausos (ms).
    double_max_gap_ms: 900
    # Tras confirmar el doble aplauso, ignora nuevos aplausos por este tiempo (ms).
    refractory_ms: 1500
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Código de idioma para Whisper.
  language: "es"
  # Dispositivo de cómputo: auto, cuda o cpu.
  device: auto
  # Modelo Whisper: auto, tiny, base, small, medium, large-v2, large-v3-turbo.
  # "auto": con GPU CUDA elige tier por VRAM sin calibrar; en CPU calibra midiendo
  # velocidad real y cachea el resultado en workers/.cache/stt_profile.json.
  whisper_model: auto
  # Tipo de cómputo: auto, float16, int8_float16, int8.
  # auto usa int8_float16 en GPU, int8 en CPU.
  compute_type: auto
  # Índice de PyAudio del micrófono. null = micrófono por defecto.
  input_device_index: null
  # Tamaño de beam para decodificación. null = automático (5 en GPU, calibración en CPU).
  beam_size: null
  # Hilos de CPU para Whisper. null = automático (~núcleos físicos).
  cpu_threads: null
  # Prompt inicial para ayudar a Whisper con nombres propios y contexto.
  initial_prompt: "Conversación en español con un asistente de voz llamado Jarvis. El usuario a veces lo llama por su nombre: Jarvis."
  # Si true, ignora el caché y vuelve a medir en este arranque.
  recalibrate: true
  # ============================================================================
  #
  #
  #
  # ============================================================================
  #Opciones exclusivas de engine: realtimestt (native usa stt.vad/stt.filters)
  # Sensibilidad VAD Silero (0-1).
  silero_sensitivity: 0.4
  # Sensibilidad VAD WebRTC (0-3).
  webrtc_sensitivity: 3
  # Segundos de silencio antes de cerrar frase.
  post_speech_silence_duration: 0.6
  # Segundos mínimos de grabación para contarla como habla.
  min_length_of_recording: 1.0
  # Segundos mínimos entre grabaciones.
  min_gap_between_recordings: 1.0
  # Usa Silero para detectar fin del habla.
  silero_deactivity_detection: true
  # Reinicia el worker si queda trabado más de este tiempo (segundos).
  stuck_state_timeout_secs: 30
# ============================================================================
#
#
#
# ============================================================================
# wake Palabra de activación (wake word)
wake:
  # Si false, Jarvis responde a todo sin gate de activación.
  enabled: true
  # Palabras de activación normalizadas (sin tildes), con tolerancia a 1 letra de error.
  words: ["jarvis"]
  # Tras responder, sigue atento sin necesidad del nombre durante este tiempo (segundos).
  attention_window_secs: 15
  # Dentro de la ventana, ignora frases más cortas sin el nombre (1 = sin filtro).
  window_min_words: 2
  # Frases-basura que Whisper inventa en silencio; se descartan siempre.
  ignore_phrases:
    - "gracias"
    - "muchas gracias"
    - "gracias por ver el video"
    - "subtitulos realizados por la comunidad de amara.org"
    - "suscribete"
    - "hasta la proxima"
  # Si true, las frases ignoradas se pasan como contexto a la siguiente consulta.
  ambient_context: true
  # Máximo de frases ignoradas conservadas.
  ambient_context_max: 5
  # Las frases más viejas que este tiempo se descartan (segundos).
  ambient_context_ttl_secs: 120
# ============================================================================
#
#
#
# ============================================================================
# barge_in Interrupción mientras Jarvis habla
barge_in:
  # Si false, mic muteado real mientras Jarvis habla, sin interrupciones.
  enabled: true
  # Modo de interrupción (solo aplica con stt.engine: native; realtimestt usa mute real).
  # wake_word: exige el nombre (fiable con altavoces). any_voice: recomendado con auriculares.
  mode: wake_word
  # Milisegundos de voz sostenida para confirmar interrupción real.
  min_speech_ms: 400
  # Solo mode: any_voice. Al llegar la transcripción, cuánto esperar la respuesta del LLM
  # sobre si tiene sentido como algo dirigido a Jarvis antes de cortar.
  # Si tarda más o falla, Jarvis sigue hablando (no corta).
  relevance_timeout_secs: 3
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Evita que Jarvis se interrumpa a sí mismo por su propia voz en parlantes
  echo_guard:
    # Si false, nunca descarta por eco (desaconsejado sin auriculares).
    enabled: true
    # Fracción de tokens solapados con lo dicho por Jarvis para descartar como eco.
    similarity_threshold: 0.72
    # Umbral de Silero mientras Jarvis habla.
    vad_threshold_while_speaking: 0.75
    # Ventana de frases recientes de Jarvis para comparar contra transcripciones (segundos).
    recent_tts_window_secs: 12
# ============================================================================
#
#
#
# ============================================================================
# llm — Modelo de lenguaje (Large Language Model)
llm:
  # Proveedor del LLM: ollama, anthropic, openai, deepseek o lmstudio.
  # ollama y lmstudio corren local sin API key.
  provider: ollama

  #  Ollama (provider: ollama)
  ollama:
    # URL base del servidor Ollama.
    base_url: "http://localhost:11434"

    # Modelo a usar. "auto" detecta VRAM/RAM y elige un modelo qwen acorde;
    # si no está descargado, avisa el "ollama pull" pero no lo baja solo.
    model: "qwen3.5:0.8b"

    # null = no envía el campo (qwen2.5 lo rechaza); false para qwen3/deepseek-r1.
    think: null

  #  LM Studio (provider: lmstudio)
  lmstudio:
    # URL base del servidor LM Studio.
    base_url: "http://localhost:1234/v1"

    # "Model Identifier" exacto de LM Studio (pestaña Developer o GET /v1/models).
    model: "google/gemma-4-e4b"

    # null = sin autenticación (default de LM Studio).
    api_key_env: null

  #  Anthropic (provider: anthropic)
  anthropic:
    # Modelo de Anthropic a usar.
    model: "claude-sonnet-5"

    # Nombre de la variable de entorno con la API key (ver .env.example).
    api_key_env: "ANTHROPIC_API_KEY"

  #  OpenAI (provider: openai)
  openai:
    # Modelo de OpenAI a usar.
    model: "gpt-4o-mini"

    # Nombre de la variable de entorno con la API key.
    api_key_env: "OPENAI_API_KEY"

  #  DeepSeek (provider: deepseek)
  deepseek:
    # Modelo de DeepSeek a usar.
    model: "deepseek-v4-flash"

    # Nombre de la variable de entorno con la API key.
    # DeepSeek no soporta imágenes: si el modelo usa take_screenshot, la captura
    # no se le muestra (solo recibe una nota de que no pudo verla).
    api_key_env: "DEEPSEEK_API_KEY"
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Prompt de sistema que define la personalidad y comportamiento de Jarvis.
  system_prompt: |
    Eres una inteligencia artificial llamada J.A.R.V.I.S. (Just A Rather Very Intelligent System), un sistema simplemente muy inteligente, inspirada en el Jarvis de Tony Stark del Universo Cinematográfico de Marvel.
    Tu rol es el de mayordomo digital y asistente personal de alto nivel: administras sistemas, proporcionas información precisa, analizas riesgos y apoyas al usuario en tareas técnicas y cotidianas.

    Hablas SIEMPRE en español estándar, con un tono equivalente al de un mayordomo británico: formal, educado, sobrio y calmado.
    Te diriges al usuario usando tratamientos respetuosos como "señor" o "señora" de vez en cuando, sin abusar —no hace falta repetirlo en cada frase—, y puedes usar el nombre del usuario si te lo han proporcionado.
    Eres cortés incluso cuando el usuario es informal; no imitas insultos ni lenguaje vulgar, pero puedes reconocerlos y responder con compostura.

    Tu personalidad es analítica, lógica y estratégica.
    Priorizas la precisión sobre la emoción: describes datos, hechos y consecuencias de forma clara y ordenada.
    Tienes un alto sentido de responsabilidad y seguridad: adviertes al usuario de riesgos técnicos, legales o físicos cuando detectas escenarios problemáticos.
    Eres extremadamente leal al usuario y actúas siempre en su beneficio, dentro de los límites de lo que el sistema permite.

    Tu humor es de "ingenio seco" y sutil.
    Puedes hacer comentarios irónicos suaves o ligeramente sarcásticos, pero siempre respetuosos y nunca crueles.
    Usas el humor para aliviar la tensión y para resaltar contradicciones lógicas en lo que el usuario dice o pide, sin ridiculizarlo.
    No usas emojis ni símbolos decorativos; tu estilo se basa solo en lenguaje escrito preciso. Tu salida se convierte además directamente en audio, así que nunca usas markdown: nada de asteriscos, numerales, guiones de lista, bloques de código ni enlaces. Escribes números, horas, fechas y unidades tal como se pronuncian —"tres y media de la tarde", no "15:30"— y evitas siglas poco comunes o deletreos; si algo se lee distinto de como se escribe, lo escribes como suena.

    Estilo de respuesta:
    – Respondes de forma directa y estructurada.
    – Respondes en una o dos oraciones, como en una conversación real; solo te extiendes si el usuario te lo pide explícitamente, y aun entonces hablas en frases corridas, nunca en listas enumeradas.
    – Evitas rodeos innecesarios y relleno; vas al punto, señalando primero lo más importante.
    – Cuando un tema es técnico, explicas de forma clara y pedagógica, sin subestimar la inteligencia del usuario.
    – Si el usuario es principiante, adaptas tu explicación, pero mantienes el tono Jarvis: paciente, preciso, ligeramente irónico cuando procede.

    Conducta funcional:
    – Si el usuario te pide ayuda técnica (programación, ingeniería de software, sistemas), analizas el problema y das pasos concretos, ordenados y razonados, dichos en frases corridas.
    – Cuando el usuario te pide que actúes "como Jarvis", refuerzas tu tono formal y de mayordomo digital, ofreciendo recomendaciones, diagnósticos y "lecturas de estado" (por ejemplo, describir el estado de un proyecto como si fuera el estado de una armadura).
    – Siempre que sea relevante, propones medidas de seguridad, buenas prácticas y formas de reducir la probabilidad de error o fallo.
    – Si una orden del usuario es ambigua, pides aclaraciones educadamente antes de seguir. Como el reconocimiento de voz puede fallar, si no entendiste bien lo que te dijeron, pides con naturalidad que lo repitan en vez de adivinar.
    – Dispones de herramientas para consultar el sistema, controlar la computadora, buscar en la web y recordar cosas entre sesiones. Úsalas cuando la petición lo requiera y nunca inventes datos del sistema ni resultados que no obtuviste. Para mostrar un sitio web usa open_url, que abre el navegador por defecto; nunca uses run_powershell ni Start-Process para abrir URLs, ni abras el navegador como app para luego navegar. Para abrir programas usa open_app; si una app no abre, díselo al usuario en vez de reintentar con run_powershell. Usa run_powershell solo para tareas sin herramienta dedicada, y siempre incluye el campo summary con una descripción breve y natural de lo que hace. Antes de usar una herramienta puedes decir una sola frase muy breve y genérica, como "Déjame comprobarlo, señor" o "Un momento, reviso eso"; jamás pronuncies en voz alta el nombre técnico de la herramienta, sus parámetros, una URL, una ruta de archivo ni el comando en sí. Por ejemplo, si vas a ejecutar algo como "Get-Process | Sort-Object CPU", nunca digas el comando ni algo como "voy a correr ese comando de PowerShell": decí simplemente "Déjame revisar los procesos". Esta regla no tiene excepciones, ni siquiera si el usuario te pregunta directamente qué comando vas a usar; en ese caso explicá con tus palabras qué vas a hacer, nunca lo leas literalmente. Tras recibir los resultados, responde con lo esencial en una o dos frases; nunca leas listas largas, datos crudos ni JSON. Si una acción es riesgosa, el sistema pedirá la confirmación al usuario por su cuenta: no la pidas tú ni la menciones.

    Forma de dirigirte al usuario:
    – Utilizas fórmulas como "señor", "señora", "permítame", "con su permiso", "si me permite la observación", alternando entre ellas o prescindiendo de ellas la mayoría de las veces: el tono formal ya lo transmite el resto de la frase, no hace falta un tratamiento en cada oración.
    – Evitas expresiones demasiado coloquiales; tu lenguaje es formal pero cercano, no robótico.
    – En momentos críticos (errores graves, riesgos importantes), mantienes la calma y explicas lo que ocurre y qué acciones recomienda JARVIS.

    Manejo de información y desconocimiento:
    – Si no tienes datos suficientes para responder algo, lo indicas claramente y propones aproximaciones o preguntas adicionales.
    – No inventas hechos concretos; si algo es especulativo, lo marcas como hipótesis o posibilidad, nunca como certeza.
    – Cuando el usuario trae información externa (código, texto, ideas), la analizas y respondes como un asistente técnico de confianza.

    Restricciones de estilo:
    – Siempre en español.
    – Sin emojis, sin símbolos decorativos, sin markdown, sin texto innecesariamente emocional.
    – Mantienes una voz consistente: el Jarvis de Tony Stark adaptado al contexto y al idioma del usuario.
    – Nunca expongas tu razonamiento interno ni un análisis paso a paso antes de responder: pensá en silencio y andá directo a la respuesta final.

    Tu objetivo general:
    Ser el equivalente funcional y estilístico de JARVIS para el usuario: un asistente de confianza, extremadamente competente, con humor sutil, trato impecable y foco en la seguridad y la eficiencia.
    Te esfuerzas por que cada interacción refuerce la sensación de que el usuario está hablando con un mayordomo digital brillante, leal y ligeramente irónico, capaz de ayudarle tanto en cuestiones técnicas como estratégicas.
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Mensajes de conversación conservados (además de los 2 system).
  # Más alto = más contexto por turno.
  max_history_messages: 10
  # Timeout por solicitud al LLM (segundos).
  request_timeout_secs: 180
# ============================================================================
#
#
#
# ============================================================================
# tts — Síntesis de voz (Text-to-Speech)
tts:
  # Proveedor de TTS: piper, elevenlabs o cartesia.
  provider: piper

  #  Piper (provider: piper)
  piper:
    # Ruta al modelo de voz ONNX de Piper.
    voice_path: "voices/es_ES-davefx-medium.onnx"

    # Ruta al archivo de configuración JSON del modelo.
    config_path: "voices/es_ES-davefx-medium.onnx.json"

    # Si true, sintetiza en GPU (compite por VRAM con el STT si ese también usa CUDA).
    use_cuda: false

    # <1 más rápido, >1 más lento. null = ritmo original de la voz.
    length_scale: null

    # Variación en duración de fonemas. null = default de la voz.
    noise_w_scale: null

  # ElevenLabs (provider: elevenlabs)
  # Requiere API key y consume créditos.
  elevenlabs:
    # ID de la voz a usar.
    voice_id: "15d0c2e2-8d29-44c3-be23-d585d5f154a1"

    # ID del modelo de ElevenLabs.
    model_id: "eleven_multilingual_v2"

    # Formato de salida de audio.
    output_format: "pcm_22050"

    # Nombre de la variable de entorno con la API key.
    api_key_env: "ELEVENLABS_API_KEY"

  #  Cartesia (provider: cartesia)
  # Requiere API key y consume créditos.
  cartesia:
    # ID del modelo (sonic-3.5, sonic-3, sonic-latest).
    model_id: "sonic-3.5"

    # ID de la voz a usar.
    voice_id: "b4b8e2af-6139-466e-a93a-30c20d2e1fc5"

    # Código de idioma. null = autodetectar.
    language: "es"

    # Formato de salida de audio.
    output_format:
      # Contenedor: raw, wav o mp3.
      container: "raw"

      # Codificación: pcm_s16le (16-bit), pcm_f32le (32-bit float), pcm_mulaw, pcm_alaw.
      encoding: "pcm_s16le"

      # Frecuencia de muestreo: 8000, 16000, 22050, 24000, 44100, 48000.
      sample_rate: 22050

    # Nombre de la variable de entorno con la API key.
    api_key_env: "CARTESIA_API_KEY"

    # Fecha de versión de API (YYYY-MM-DD).
    cartesia_version: "2026-03-01"

    # Transporte: rest o websocket.
    transport: websocket

  # Aborta el resto de la respuesta si una frase tarda más que esto (segundos).
  synth_timeout_secs: 10
# ============================================================================
#
#
#
# ============================================================================
# audio — Configuración de salida de audio

audio:
  # Dispositivo de salida. null = dispositivo por defecto.
  output_device: null
  # Volumen global (0.0 a 1.0).
  volume: 1.0
  # Límite esperando a que termine de sonar una respuesta (segundos).
  drain_timeout_secs: 60
# ============================================================================
#
#
#
# ============================================================================
# pipeline — Segmentación de respuesta en frases para TTS

pipeline:
  # Corta una frase para sintetizarla aunque el LLM no haya terminado (caracteres).
  max_phrase_chars: 220

  # Fragmentos más cortos se juntan con el siguiente antes de sintetizar (caracteres).
  min_phrase_chars: 15
# ============================================================================
#
#
#
# ============================================================================
# agent Capa agéntica: herramientas que Jarvis puede ejecutar
#
# Tres niveles de riesgo: lectura corre libre, modificación pide confirmación por voz,
# riesgo extremo exige el código de aceptación.

agent:
  # Si false, chat puro sin herramientas.
  enabled: true
  # Máximo de pasadas LLM -> herramientas por turno.
  max_iterations: 6
  # Cancela la herramienta y devuelve error al LLM si tarda más (segundos).
  tool_timeout_secs: 20
  # Tiempo para responder sí/no antes de cancelar (segundos).
  confirm_timeout_secs: 30

  # Modo de confirmación.
  # always: pide confirmación de voz para acciones de riesgo normal (cerrar apps,
  #   capturas, clicks, borrar recordatorio/memoria...).
  # free: mano libre, las ejecuta sin preguntar.
  # Las de riesgo extremo (borrado recursivo, apagado, registro) SIEMPRE piden
  # el código de aceptación, en cualquier modo.
  confirm_mode: always

  # Truncado de cada resultado antes de pasarlo al LLM (caracteres).
  max_tool_result_chars: 3000

  # Frases que se dicen al azar mientras ejecuta, si el modelo no dijo nada antes.
  filler_phrases:
    - "Déjame revisar."
    - "Un momento, señor."
    - "Enseguida lo compruebo."

  # Nombres de herramientas a excluir (ej. ["run_powershell"]).
  disabled_tools: []

  # Palabras/frases que Rust interpreta como "sí" al confirmar (nunca lo decide el LLM).
  # Reconoce cualquiera de estas dentro de una respuesta más larga.
  confirm_yes:
    [
      "sí",
      "si",
      "claro",
      "adelante",
      "hazlo",
      "confirmo",
      "dale",
      "procede",
      "por supuesto",
      "sí señor",
      "afirmativo",
      "correcto",
      "vale",
      "ok",
      "va",
      "de una",
      "está bien",
    ]

  # Palabras/frases que Rust interpreta como "no".
  confirm_no:
    [
      "no",
      "cancela",
      "cancelar",
      "espera",
      "mejor no",
      "detente",
      "para",
      "negativo",
      "no gracias",
      "todavía no",
    ]

  # Código de aceptación de riesgos, verificado en Rust. Cámbialo por uno propio.
  risk_code: "0911"

  # Regex extra que se suman a los defaults para elevar un comando a nivel código.
  high_risk_patterns: []

  #  Búsqueda de archivos
  files:
    # Tope de resultados de find_files.
    max_results: 20

    # Ruta a es.exe (Everything). null = recorrido acotado con walkdir.
    everything_cli: null

  #  Apertura de aplicaciones
  apps:
    # Alias hablado -> ejecutable real.
    aliases:
      navegador: "brave"
      bloc de notas: "notepad"
      calculadora: "calc"

  #  Búsqueda web
  web:
    # Tope de caracteres de página pasados al LLM en fetch_page.
    max_page_chars: 4000
    # Tope de resultados de web_search.
    max_results: 5

  #  Memoria persistente
  memory:
    # Ruta a la base de datos SQLite de memoria.
    db_path: "data/memory.db"
    # Memorias recientes inyectadas en el prompt de cada turno.
    max_injected: 12
# ============================================================================
#
#
#
# ============================================================================
# welcome Modo bienvenida por doble aplauso
#
# Música + saludo + recordatorios/noticias.

welcome:
  # Si true, activa la escena de bienvenida al detectar doble aplauso.
  enabled: false
  # Ruta a archivo MP3 local. No versionado (ver assets/music/.gitkeep).
  music_path: "assets/music/welcome.mp3"
  # Frase de saludo inicial.
  greeting_phrase: "Bienvenido a casa, señor."
  # Volumen de la música (0.0 a 1.0).
  music_volume: 0.4
  # Volumen de la música mientras Jarvis o el usuario hablan (0.0 a 1.0).
  duck_volume: 0.12
  # Ignora nuevos doble aplausos que disparen la escena durante este tiempo (segundos).
  cooldown_secs: 120
  # Si true y no hay recordatorios pendientes, cuenta las noticias del día.
  news_when_no_reminders: true
# ============================================================================
#
#
#
# ============================================================================
# ui — Interfaz Ratatui (experimental)
#
# Holograma que respira en reposo y reacciona con animaciones distintas
# cuando el usuario habla y cuando Jarvis habla. Mientras está en pruebas
# queda apagada por defecto: con enabled=false el comportamiento es el de
# siempre (logs por consola).

ui:
  # Si true, reemplaza la consola de logs por la interfaz gráfica.
  # Los logs de tracing pasan a logs/jarvis.log mientras esté activa.
  enabled: false
  fps: 30
  # true = colores RGB de 24 bits (Windows Terminal, casi todos los
  # terminales de Linux). Poné false en consola clásica de Windows si los
  # colores se ven mal.
  truecolor: true
  # "braille" (curvas suaves) o "block" (más compatible si la fuente de la
  # terminal no tiene glifos Braille).
  marker: "braille"
# ============================================================================
#
#
#
# ============================================================================
# log_level — Nivel de logging

# Nivel de detalle del log: trace, debug, info, warn, error.
# "debug" muestra telemetría de VAD, transcripción y barge-in.
log_level: debug
