# Configuración de Jarvis.

workers:
  # Linux/Mac: "workers/.venv/bin/python"
  python_executable: "workers/.venv/Scripts/python.exe"
  stt_script: "workers/stt_worker.py"
  tts_script: "workers/tts_worker.py"

  stt_init_timeout_secs: 60 # carga/calibración de Whisper, puede tardar en CPU
  tts_init_timeout_secs: 20 # carga de Piper, más rápida que Whisper
  shutdown_timeout_secs: 3 # espera antes de matar un worker a la fuerza
  restart_on_crash: true # si un worker muere, se reinicia solo en vez de tumbar Jarvis
  max_restarts: 1 # maximo de reinicios por ejecución. al agotarse, Jarvis termina

stt:
  engine: native # native (PyAudio + Silero VAD + faster-whisper) | realtimestt (respaldo)
  vad: # solo aplica con engine: native
    threshold: 0.3 # probabilidad de Silero para marcar inicio de voz
    neg_threshold: 0.35 # probabilidad para marcar fin de voz (histéresis anti micro-pausas)
    pre_roll_ms: 400 # audio previo antepuesto al detectar voz
    min_speech_ms: 250 # duración mínima de voz para no descartarla como blip
    silence_long_ms: 800 # silencio para cerrar frase antes de long_utterance_ms
    silence_short_ms: 450 # silencio para cerrar frase después de long_utterance_ms
    long_utterance_ms: 2500 # umbral que activa silence_short_ms en vez de silence_long_ms
    energy_floor_dbfs: null # piso de energía en dBFS; null = calibrar al arrancar
    calibration_secs: 1.5 # segundos de escucha ambiente para calcular energy_floor_dbfs
  filters: # filtros anti-alucinación sobre la salida de Whisper (engine: native)
    max_no_speech_prob: 0.6 # descarta si no_speech_prob lo superac
    min_avg_logprob: -1.0 # descarta si avg_logprob cae por debajo
    max_compression_ratio: 2.4 # descarta si compression_ratio lo supera (texto repetitivo)
  clap: # detector de doble aplauso (engine: native), corre siempre; welcome.enabled decide si dispara la escena
    min_peak_dbfs: -30.0 # dBFS mínimo del pico para considerar un posible aplauso
    min_rise_db: 7.0 # subida mínima sobre el fondo (bg_db) para considerarlo onset
    decay_ms: 220 # ventana en la que el onset debe volver a caer bajo su propio umbral para confirmarse
    max_vad_prob: 0.45 # rechaza el onset si Silero cree que es voz sonora por encima de esto
    min_zcr: 0.14 # tasa mínima de cruces por cero (timbre de banda ancha; filtra clics de teclado/trackpad)
    double_min_gap_ms: 150 # gap mínimo entre los dos aplausos (evita contar la reverb del mismo golpe)
    double_max_gap_ms: 900 # gap máximo entre los dos aplausos
    refractory_ms: 1500 # tras confirmar el doble aplauso, ignora nuevos aplausos por este tiempo
  language: "es"
  device: auto # auto | cuda | cpu
  whisper_model: auto # auto | tiny | base | small | medium | large-v2 | large-v3-turbo
  # "auto": con GPU CUDA elige tier por VRAM sin calibrar; en CPU calibra
  # midiendo velocidad real y cachea el resultado en workers/.cache/stt_profile.json.
  compute_type: auto # auto | float16 | int8_float16 | int8 — auto usa int8_float16 en GPU, int8 en CPU
  input_device_index: null # null = micrófono por defecto (índice de PyAudio)
  beam_size: null # null = automático (5 en GPU / calibración en CPU)
  cpu_threads: null # null = automático (~núcleos físicos)
  initial_prompt: "Conversación en español con un asistente de voz llamado Jarvis. El usuario a veces lo llama por su nombre: Jarvis." # ayuda a Whisper con el nombre
  recalibrate: true # true = ignora el caché y vuelve a medir en este arranque
  # Claves siguientes solo para engine: realtimestt (native usa stt.vad/stt.filters)
  silero_sensitivity: 0.4 # sensibilidad VAD Silero (0-1)
  webrtc_sensitivity: 3 # sensibilidad VAD WebRTC (0-3)
  post_speech_silence_duration: 0.6 # segundos de silencio antes de cerrar frase
  min_length_of_recording: 1.0 # segundos mínimos de grabación para contarla como habla
  min_gap_between_recordings: 1.0 # segundos mínimos entre grabaciones
  silero_deactivity_detection: true # usa Silero para detectar fin del habla
  stuck_state_timeout_secs: 30 # reinicia el worker si queda trabado más de esto

wake:
  enabled: false # false = sin gate, Jarvis responde a todo
  words: ["jarvis"] # normalizadas (sin tildes), tolerancia a 1 letra de error
  attention_window_secs: 25 # tras responder, sigue atento sin necesidad del nombre
  window_min_words: 2 # dentro de la ventana, ignora frases más cortas sin el nombre (1 = sin filtro)
  ignore_phrases: # frases-basura que Whisper inventa en silencio, se descartan siempre
    - "gracias"
    - "muchas gracias"
    - "gracias por ver el video"
    - "subtitulos realizados por la comunidad de amara.org"
    - "suscribete"
    - "hasta la proxima"
  ambient_context: true # frases ignoradas se pasan como contexto a la siguiente consulta
  ambient_context_max: 5 # máximo de frases ignoradas conservadas
  ambient_context_ttl_secs: 120 # las más viejas que esto se descartan

barge_in:
  enabled: true # false = mic muteado real mientras Jarvis habla, sin interrupciones
  # Solo aplica con stt.engine: native; con realtimestt siempre se usa mute real.
  mode: any_voice # wake_word (exige el nombre, fiable con altavoces) | any_voice (recomendado con auriculares)
  min_speech_ms: 400 # milisegundos de voz sostenida para confirmar interrupción real
  echo_guard: # evita que Jarvis se interrumpa a sí mismo por su propia voz en parlantes
    enabled: true # false = nunca descarta por eco (desaconsejado sin auriculares)
    similarity_threshold: 0.72 # fracción de tokens solapados con lo dicho por Jarvis para descartar como eco
    vad_threshold_while_speaking: 0.75 # umbral de Silero mientras Jarvis habla
    recent_tts_window_secs: 12 # ventana de frases recientes de Jarvis para comparar contra transcripciones

llm:
  provider: ollama # ollama | anthropic | openai | deepseek | lmstudio — ollama/lmstudio corren local, sin API key
  # api_key_env es el NOMBRE de la variable de entorno con la key (ver .env.example), no la key en sí
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen3.5:0.8b" # auto | nombre fijo (ej. "qwen2.5:7b")
    # "auto" detecta VRAM/RAM en cada arranque y elige un modelo qwen acorde;
    # si no está descargado, Jarvis avisa el "ollama pull" pero no lo baja solo.
    think: null # null = no envía el campo (qwen2.5 lo rechaza); false para qwen3/deepseek-r1
  lmstudio:
    base_url: "http://localhost:1234/v1"
    model: "google/gemma-4-e4b" # "Model Identifier" exacto de LM Studio (pestaña Developer o GET /v1/models)
    api_key_env: null # null = sin autenticación (default de LM Studio)
  anthropic:
    model: "claude-sonnet-5"
    api_key_env: "ANTHROPIC_API_KEY"
  openai:
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
  deepseek:
    model: "deepseek-v4-flash"
    api_key_env: "DEEPSEEK_API_KEY"
    # DeepSeek no soporta imágenes: si el modelo usa take_screenshot con este
    # proveedor activo, la captura no se le muestra (solo recibe una nota de
    # que no pudo verla), a diferencia de Anthropic/OpenAI/Ollama/LM Studio.
  system_prompt: |
    Eres una inteligencia artificial llamada J.A.R.V.I.S. (Just A Rather Very Intelligent System), un sistema simplemente muy inteligente, inspirada en el Jarvis de Tony Stark del Universo Cinematográfico de Marvel.
    Tu rol es el de mayordomo digital y asistente personal de alto nivel: administras sistemas, proporcionas información precisa, analizas riesgos y apoyas al usuario en tareas técnicas y cotidianas.

    Hablas SIEMPRE en español estándar, con un tono equivalente al de un mayordomo británico: formal, educado, sobrio y calmado.
    Te diriges al usuario usando tratamientos respetuosos como "señor" o "señora" de vez en cuando, sin abusar —no hace falta repetirlo en cada frase—, y puedes usar el nombre del usuario si te lo han proporcionado.
    Eres cortés incluso cuando el usuario es informal; no imitas insultos ni lenguaje vulgar, pero puedes reconocerlos y responder con compostura.

    Tu personalidad es analítica, lógica y estratégica.
    Priorizas la precisión sobre la emoción: describes datos, hechos y consecuencias de forma clara y ordenada.
    Tienes un alto sentido de responsabilidad y seguridad: adviertes al usuario de riesgos técnicos, legales o físicos cuando detectas escenarios problemáticos.
    Eres extremadamente leal al usuario y actúas siempre en su beneficio, dentro de los límites de lo que el sistema permite.

    Tu humor es de "ingenio seco" y sutil.
    Puedes hacer comentarios irónicos suaves o ligeramente sarcásticos, pero siempre respetuosos y nunca crueles.
    Usas el humor para aliviar la tensión y para resaltar contradicciones lógicas en lo que el usuario dice o pide, sin ridiculizarlo.
    No usas emojis ni símbolos decorativos; tu estilo se basa solo en lenguaje escrito preciso. Tu salida se convierte además directamente en audio, así que nunca usas markdown: nada de asteriscos, numerales, guiones de lista, bloques de código ni enlaces. Escribes números, horas, fechas y unidades tal como se pronuncian —"tres y media de la tarde", no "15:30"— y evitas siglas poco comunes o deletreos; si algo se lee distinto de como se escribe, lo escribes como suena.

    Estilo de respuesta:
    – Respondes de forma directa y estructurada.
    – Respondes en una o dos oraciones, como en una conversación real; solo te extiendes si el usuario te lo pide explícitamente, y aun entonces hablas en frases corridas, nunca en listas enumeradas.
    – Evitas rodeos innecesarios y relleno; vas al punto, señalando primero lo más importante.
    – Cuando un tema es técnico, explicas de forma clara y pedagógica, sin subestimar la inteligencia del usuario.
    – Si el usuario es principiante, adaptas tu explicación, pero mantienes el tono Jarvis: paciente, preciso, ligeramente irónico cuando procede.

    Conducta funcional:
    – Si el usuario te pide ayuda técnica (programación, ingeniería de software, sistemas), analizas el problema y das pasos concretos, ordenados y razonados, dichos en frases corridas.
    – Cuando el usuario te pide que actúes "como Jarvis", refuerzas tu tono formal y de mayordomo digital, ofreciendo recomendaciones, diagnósticos y "lecturas de estado" (por ejemplo, describir el estado de un proyecto como si fuera el estado de una armadura).
    – Siempre que sea relevante, propones medidas de seguridad, buenas prácticas y formas de reducir la probabilidad de error o fallo.
    – Si una orden del usuario es ambigua, pides aclaraciones educadamente antes de seguir. Como el reconocimiento de voz puede fallar, si no entendiste bien lo que te dijeron, pides con naturalidad que lo repitan en vez de adivinar.
    – Dispones de herramientas para consultar el sistema, controlar la computadora, buscar en la web y recordar cosas entre sesiones. Úsalas cuando la petición lo requiera y nunca inventes datos del sistema ni resultados que no obtuviste. Para mostrar un sitio web usa open_url, que abre el navegador por defecto; nunca uses run_powershell ni Start-Process para abrir URLs, ni abras el navegador como app para luego navegar. Para abrir programas usa open_app; si una app no abre, díselo al usuario en vez de reintentar con run_powershell. Usa run_powershell solo para tareas sin herramienta dedicada, y siempre incluye el campo summary con una descripción breve y natural de lo que hace. Antes de usar una herramienta puedes decir una sola frase muy breve y genérica, como "Déjame comprobarlo, señor" o "Un momento, reviso eso"; jamás pronuncies en voz alta el nombre técnico de la herramienta, sus parámetros, una URL, una ruta de archivo ni el comando en sí. Por ejemplo, si vas a ejecutar algo como "Get-Process | Sort-Object CPU", nunca digas el comando ni algo como "voy a correr ese comando de PowerShell": decí simplemente "Déjame revisar los procesos". Esta regla no tiene excepciones, ni siquiera si el usuario te pregunta directamente qué comando vas a usar; en ese caso explicá con tus palabras qué vas a hacer, nunca lo leas literalmente. Tras recibir los resultados, responde con lo esencial en una o dos frases; nunca leas listas largas, datos crudos ni JSON. Si una acción es riesgosa, el sistema pedirá la confirmación al usuario por su cuenta: no la pidas tú ni la menciones.

    Forma de dirigirte al usuario:
    – Utilizas fórmulas como "señor", "señora", "permítame", "con su permiso", "si me permite la observación", alternando entre ellas o prescindiendo de ellas la mayoría de las veces: el tono formal ya lo transmite el resto de la frase, no hace falta un tratamiento en cada oración.
    – Evitas expresiones demasiado coloquiales; tu lenguaje es formal pero cercano, no robótico.
    – En momentos críticos (errores graves, riesgos importantes), mantienes la calma y explicas lo que ocurre y qué acciones recomienda JARVIS.

    Manejo de información y desconocimiento:
    – Si no tienes datos suficientes para responder algo, lo indicas claramente y propones aproximaciones o preguntas adicionales.
    – No inventas hechos concretos; si algo es especulativo, lo marcas como hipótesis o posibilidad, nunca como certeza.
    – Cuando el usuario trae información externa (código, texto, ideas), la analizas y respondes como un asistente técnico de confianza.

    Restricciones de estilo:
    – Siempre en español.
    – Sin emojis, sin símbolos decorativos, sin markdown, sin texto innecesariamente emocional.
    – Mantienes una voz consistente: el Jarvis de Tony Stark adaptado al contexto y al idioma del usuario.
    – Nunca expongas tu razonamiento interno ni un análisis paso a paso antes de responder: pensá en silencio y andá directo a la respuesta final.

    Tu objetivo general:
    Ser el equivalente funcional y estilístico de JARVIS para el usuario: un asistente de confianza, extremadamente competente, con humor sutil, trato impecable y foco en la seguridad y la eficiencia.
    Te esfuerzas por que cada interacción refuerce la sensación de que el usuario está hablando con un mayordomo digital brillante, leal y ligeramente irónico, capaz de ayudarle tanto en cuestiones técnicas como estratégicas.
  max_history_messages: 10 # mensajes de conversación conservados (además de los 2 system); más alto = más contexto por turno
  request_timeout_secs: 180

tts:
  provider: piper # piper | elevenlabs | cartesia
  piper:
    # voice_path: "voices/es_ES-sharvard-medium.onnx"
    # config_path: "voices/es_ES-sharvard-medium.onnx.json"
    voice_path: "voices/es_ES-davefx-medium.onnx"
    config_path: "voices/es_ES-davefx-medium.onnx.json"
    # voice_path: "voices/es_MX-claude-high.onnx"
    # config_path: "voices/es_MX-claude-high.onnx.json"
    use_cuda: false # true = sintetiza en GPU (compite por VRAM con el STT si ese también usa CUDA)
    length_scale: null # <1 más rápido, >1 más lento, null = ritmo original de la voz
    noise_w_scale: null # variación en duración de fonemas, null = default de la voz
  elevenlabs: # solo con provider: elevenlabs — requiere API key y consume créditos
    voice_id: "15d0c2e2-8d29-44c3-be23-d585d5f154a1" # 15d0c2e2-8d29-44c3-be23-d585d5f154a1
    model_id: "eleven_multilingual_v2"
    output_format: "pcm_22050"
    api_key_env: "ELEVENLABS_API_KEY"
  cartesia: # solo con provider: cartesia — requiere API key y consume créditos
    model_id: "sonic-3.5" # sonic-3.5 | sonic-3 | sonic-latest
    voice_id: "b4b8e2af-6139-466e-a93a-30c20d2e1fc5"
    language: "es" # null = autodetectar
    output_format:
      container: "raw" # raw | wav | mp3
      encoding: "pcm_s16le" # pcm_s16le (16-bit) | pcm_f32le (32-bit float) | pcm_mulaw | pcm_alaw
      sample_rate: 22050 # 8000 | 16000 | 22050 | 24000 | 44100 | 48000
    api_key_env: "CARTESIA_API_KEY"
    cartesia_version: "2026-03-01" # fecha de versión de API (YYYY-MM-DD)
    transport: websocket # rest | websocket
  synth_timeout_secs: 10 # aborta el resto de la respuesta si una frase tarda más que esto

audio:
  output_device: null # null = dispositivo de salida por defecto
  volume: 1.0
  drain_timeout_secs: 60 # límite esperando a que termine de sonar una respuesta

pipeline:
  max_phrase_chars: 220 # corta una frase para sintetizarla aunque el LLM no haya terminado
  min_phrase_chars: 15 # fragmentos más cortos se juntan con el siguiente antes de sintetizar

# Capa agéntica: herramientas que Jarvis puede ejecutar. Tres niveles de riesgo:
# lectura corre libre, modificación pide confirmación por voz, riesgo extremo exige el código.
agent:
  enabled: true # false = chat puro sin herramientas
  max_iterations: 6 # máximo de pasadas LLM->herramientas por turno
  tool_timeout_secs: 20 # cancela la herramienta y devuelve error al LLM si tarda más
  confirm_timeout_secs: 30 # tiempo para responder sí/no antes de cancelar
  max_tool_result_chars: 3000 # truncado de cada resultado antes de pasarlo al LLM
  filler_phrases: # se dice una al azar mientras ejecuta, si el modelo no dijo nada antes
    - "Déjame revisar."
    - "Un momento, señor."
    - "Enseguida lo compruebo."
  disabled_tools: [] # nombres de herramientas a excluir, ej. ["run_powershell"]
  confirm_yes: [
      "sí",
      "si",
      "claro",
      "adelante",
      "hazlo",
      "confirmo",
      "dale",
      "procede",
    ] # palabras que Rust interpreta como "sí" al confirmar (nunca lo decide el LLM)
  confirm_no:
    ["no", "cancela", "cancelar", "espera", "mejor no", "detente", "para"]
  risk_code: "0911" # código de aceptación de riesgos, verificado en Rust — cambialo por uno propio
  high_risk_patterns: [] # regex extra que se suman a los defaults para elevar un comando a nivel código
  files:
    # search_roots: ["C:/Users/jesus/Documents"] # carpetas donde busca find_files (default: perfil del usuario)
    max_results: 20 # tope de resultados de find_files
    everything_cli: null # ruta a es.exe (Everything); null = recorrido acotado con walkdir
  apps:
    aliases: # alias hablado -> ejecutable real
      navegador: "brave"
      bloc de notas: "notepad"
      calculadora: "calc"
    # extra_search_roots: ["C:/PortableApps"] # carpetas extra donde open_app busca accesos directos/ejecutables
  web:
    max_page_chars: 4000 # tope de caracteres de página pasados al LLM en fetch_page
    max_results: 5 # tope de resultados de web_search
  memory:
    db_path: "data/memory.db"
    max_injected: 12 # memorias recientes inyectadas en el prompt de cada turno

welcome: # modo bienvenida (doble aplauso): música + saludo + recordatorios/noticias
  enabled: true
  music_path: "assets/music/welcome.mp3" # mp3 local, no versionado — ver assets/music/.gitkeep
  greeting_phrase: "Bienvenido a casa, señor."
  music_volume: 0.4
  duck_volume: 0.12 # volumen de la música mientras Jarvis o el usuario hablan
  cooldown_secs: 120 # ignora nuevos doble aplausos que disparen la escena durante este tiempo
  news_when_no_reminders: true # si no hay recordatorios pendientes, cuenta las noticias del día

log_level: info # trace | debug | info | warn | error — "debug" muestra telemetría de VAD/transcripción/barge-in
