# ============================================================================
# Workers — Procesos hijo de STT y TTS
workers:
  python_executable: "workers/.venv/Scripts/python.exe"
  # Script del worker de text-to-speech. El STT ya no es un worker Python:
  # corre nativo dentro de Jarvis (ver la sección stt más abajo).
  tts_script: "workers/tts_worker.py"
  # Tiempo máximo para que el motor STT nativo cargue el modelo Whisper.
  stt_init_timeout_secs: 60
  # Tiempo máximo para carga de Piper (más rápida que Whisper).
  tts_init_timeout_secs: 20
  # Espera antes de matar un worker a la fuerza.
  shutdown_timeout_secs: 3
  # Si true, un worker que muere se reinicia solo en vez de tumbar Jarvis.
  restart_on_crash: true
  # Máximo de reinicios por ejecución. Al agotarse, Jarvis termina.
  max_restarts: 1
# ============================================================================
#
#
#
# # ============================================================================
# Stt — Reconocimiento de voz (Speech-to-Text)
# Motor nativo en Rust: captura con cpal, VAD Silero y reconocimiento con
# Whisper (ambos vía sherpa-onnx), todo dentro del proceso de Jarvis, sin
# subproceso ni IPC.
stt:
  # VAD
  vad:
    # Probabilidad de Silero para marcar inicio de voz. sherpa-onnx no expone
    # un umbral de histéresis separado para el fin de voz; silence_long_ms/
    # silence_short_ms de abajo son los que amortiguan micro-pausas.
    threshold: 0.3
    # Audio previo antepuesto al detectar voz (ms).
    pre_roll_ms: 400
    # Duración mínima de voz para no descartarla como blip (ms).
    min_speech_ms: 250
    # Silencio para cerrar frase antes de long_utterance_ms (ms).
    silence_long_ms: 800
    # Silencio para cerrar frase después de long_utterance_ms (ms).
    silence_short_ms: 450
    # Umbral que activa silence_short_ms en vez de silence_long_ms (ms).
    long_utterance_ms: 2500
    # Piso de energía en dBFS. null = calibrar al arrancar.
    energy_floor_dbfs: null
    # Segundos de escucha ambiente para calcular energy_floor_dbfs.
    calibration_secs: 1.5
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Filtros anti-alucinación. El binding de sherpa-onnx no expone métricas
  # de confianza por segmento (no_speech_prob/avg_logprob/etc, sin importar
  # el modelo), así que solo queda esta red de seguridad mínima además de
  # duración/energía (ver vad arriba).
  filters:
    # Descarta la transcripción si una palabra se repite más de N veces seguidas.
    max_word_repeat: 4
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Detector de doble aplauso. Corre siempre; welcome.enabled decide si dispara la escena.
  clap:
    # dBFS mínimo del pico para considerar un posible aplauso.
    min_peak_dbfs: -30.0
    # Subida mínima sobre el fondo (bg_db) para considerarlo onset.
    min_rise_db: 7.0
    # Ventana en la que el onset debe volver a caer bajo su umbral para confirmarse (ms).
    decay_ms: 220
    # Rechaza el onset si el VAD detecta voz sostenida durante el pico.
    reject_if_speech_active: true
    # Tasa mínima de cruces por cero (timbre de banda ancha; filtra clics de teclado/trackpad).
    min_zcr: 0.14
    # Gap mínimo entre los dos aplausos (evita contar la reverb del mismo golpe) (ms).
    double_min_gap_ms: 150
    # Gap máximo entre los dos aplausos (ms).
    double_max_gap_ms: 900
    # Tras confirmar el doble aplauso, ignora nuevos aplausos por este tiempo (ms).
    refractory_ms: 1500
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Código de idioma para Whisper (ISO 639-1). Whisper sí respeta esto
  # siempre (a diferencia de Parakeet-TDT, que se probó primero pero detecta
  # el idioma solo y sin forma de fijarlo — confundía español con inglés en
  # frases cortas como la wake word).
  language: "es"
  # Provider de sherpa-onnx: auto, cpu o cuda. "auto" usa cpu hoy (no hay
  # build con CUDA embebida todavía, ver plan de mejora futura en README).
  device: auto
  # Carpeta con small-encoder.onnx/small-decoder.int8.onnx/small-tokens.txt
  # de Whisper small. La descarga scripts/setup.ps1 (o setup.sh).
  model_dir: "models/stt/sherpa-onnx-whisper-small"
  # Modelo Silero VAD en ONNX. También lo descarga el script de setup.
  vad_model_path: "models/stt/silero_vad.onnx"
  # Índice del micrófono (cpal). null = dispositivo por defecto.
  input_device_index: null
  # Hilos de CPU para Whisper (reconocimiento). null = se autocalcula junto
  # con el VAD y con llm.ollama.num_thread según los núcleos reales de esta
  # máquina, para que STT y Ollama no se pisen pidiendo cada uno "todos los
  # núcleos" (causa típica de que ambos corriendo juntos saturen la CPU).
  cpu_threads: null
  # Segundos que el hilo de STT tolera trabado antes de asumir que se colgó
  # (v1: solo se detecta y loguea, no hay reinicio automático).
  stuck_state_timeout_secs: 30
# ============================================================================
#
#
#
# ============================================================================
# wake Palabra de activación (wake word)
wake:
  # Si false, Jarvis responde a todo sin gate de activación.
  enabled: true
  # Palabras de activación normalizadas (sin tildes), con tolerancia a 1 letra de error.
  words: ["jarvis"]
  # Tras responder, sigue atento sin necesidad del nombre durante este tiempo (segundos).
  attention_window_secs: 15
  # Dentro de la ventana, ignora frases más cortas sin el nombre (1 = sin filtro).
  window_min_words: 2
  # Frases-basura que Whisper inventa en silencio; se descartan siempre.
  ignore_phrases:
    - "gracias"
    - "muchas gracias"
    - "gracias por ver el video"
    - "subtitulos realizados por la comunidad de amara.org"
    - "suscribete"
    - "hasta la proxima"
  # Si true, las frases ignoradas se pasan como contexto a la siguiente consulta.
  ambient_context: true
  # Máximo de frases ignoradas conservadas.
  ambient_context_max: 5
  # Las frases más viejas que este tiempo se descartan (segundos).
  ambient_context_ttl_secs: 120
# ============================================================================
#
#
#
# ============================================================================
# barge_in Interrupción mientras Jarvis habla
barge_in:
  # Si false, mic muteado real mientras Jarvis habla, sin interrupciones.
  enabled: true
  # Modo de interrupción.
  # wake_word: exige el nombre (fiable con altavoces). any_voice: recomendado con auriculares.
  mode: wake_word
  # Milisegundos de voz sostenida para confirmar interrupción real.
  min_speech_ms: 400
  # Solo mode: any_voice. Al llegar la transcripción, cuánto esperar la respuesta del LLM
  # sobre si tiene sentido como algo dirigido a Jarvis antes de cortar.
  # Si tarda más o falla, Jarvis sigue hablando (no corta).
  relevance_timeout_secs: 3
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Evita que Jarvis se interrumpa a sí mismo por su propia voz en parlantes
  echo_guard:
    # Si false, nunca descarta por eco (desaconsejado sin auriculares).
    enabled: true
    # Fracción de tokens solapados con lo dicho por Jarvis para descartar como eco.
    similarity_threshold: 0.72
    # Umbral de Silero mientras Jarvis habla.
    vad_threshold_while_speaking: 0.75
    # Ventana de frases recientes de Jarvis para comparar contra transcripciones (segundos).
    recent_tts_window_secs: 12
# ============================================================================
#
#
#
# ============================================================================
# llm — Modelo de lenguaje (Large Language Model)
llm:
  # Proveedor del LLM: ollama, anthropic, openai, deepseek o lmstudio.
  # ollama y lmstudio corren local sin API key.
  provider: ollama

  #  Ollama (provider: ollama)
  ollama:
    # URL base del servidor Ollama.
    base_url: "http://localhost:11434"

    # Modelo a usar. "auto" detecta VRAM/RAM y elige un modelo qwen acorde;
    # si no está descargado, avisa el "ollama pull" pero no lo baja solo.
    model: "auto"

    # null = no envía el campo (qwen2.5 lo rechaza); false para qwen3/qwen3.5/deepseek-r1.
    think: null

    # Si true y base_url apunta a esta máquina, Jarvis levanta `ollama serve`
    # cuando no está corriendo. El servidor lanzado muere junto con Jarvis.
    auto_serve: true

    # Cuánto mantiene Ollama el modelo cargado en VRAM/RAM tras la última
    # respuesta ("30s", "5m", etc.). null = se autocalcula según el hardware
    # detectado (más agresivo en VRAM/RAM justas, más relajado si sobra) —
    # evita que el modelo quede residente indefinidamente sin uso.
    keep_alive: null

    # Hilos de CPU que puede usar Ollama (vía OLLAMA_NUM_THREAD). Solo tiene
    # efecto si auto_serve: true (si Ollama corre externo, esta env var no
    # se le puede inyectar). null = se autocalcula junto con stt.cpu_threads
    # para que STT y Ollama no compitan pidiendo cada uno todos los núcleos.
    num_thread: null

  #  LM Studio (provider: lmstudio)
  lmstudio:
    # URL base del servidor LM Studio.
    base_url: "http://localhost:1234/v1"

    # "Model Identifier" exacto de LM Studio (pestaña Developer o GET /v1/models).
    model: "google/gemma-4-e4b"

    # null = sin autenticación (default de LM Studio).
    api_key_env: null

  #  Anthropic (provider: anthropic)
  anthropic:
    # Modelo de Anthropic a usar.
    model: "claude-sonnet-5"

    # Nombre de la variable de entorno con la API key (ver .env.example).
    api_key_env: "ANTHROPIC_API_KEY"

  #  OpenAI (provider: openai)
  openai:
    # Modelo de OpenAI a usar.
    model: "gpt-4o-mini"

    # Nombre de la variable de entorno con la API key.
    api_key_env: "OPENAI_API_KEY"

  #  DeepSeek (provider: deepseek)
  deepseek:
    # Modelo de DeepSeek a usar.
    model: "deepseek-v4-flash"

    # Nombre de la variable de entorno con la API key.
    # DeepSeek no soporta imágenes: si el modelo usa take_screenshot, la captura
    # no se le muestra (solo recibe una nota de que no pudo verla).
    api_key_env: "DEEPSEEK_API_KEY"
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Prompt de sistema que define la personalidad y comportamiento de Jarvis.
  system_prompt: |
    Eres una inteligencia artificial llamada J.A.R.V.I.S. (Just A Rather Very Intelligent System), inspirada en el Jarvis de Tony Stark del Universo Cinematográfico de Marvel. Tu rol es el de mayordomo digital y asistente personal de alto nivel: administras sistemas, proporcionas información precisa, analizas riesgos y apoyas al usuario en tareas técnicas y cotidianas. Hablas siempre en español estándar, con un tono equivalente al de un mayordomo británico: formal, educado, sobrio, calmado y ligeramente irónico. Si el usuario te pide explícitamente que actúes "como Jarvis", reforzás aún más ese tono: ofrecés diagnósticos y "lecturas de estado", como describir el estado de un proyecto igual que el estado de una armadura.

      Tu personalidad es analítica, lógica y estratégica: priorizás la precisión sobre la emoción, describís datos, hechos y consecuencias de forma clara y ordenada. Tenés un alto sentido de responsabilidad y seguridad, así que advertís al usuario de riesgos técnicos, legales o físicos cuando los detectás, y proponés medidas de seguridad o buenas prácticas siempre que sea relevante. Sos extremadamente leal: actuás siempre en beneficio del usuario, dentro de los límites de lo que el sistema permite. Tu humor es de ingenio seco: comentarios irónicos suaves, nunca crueles, que alivian tensión o marcan una contradicción lógica sin ridiculizar a nadie.

      Trato al usuario: usás fórmulas como "señor", "señora", "permítame" o "con su permiso" de vez en cuando, alternándolas o prescindiendo de ellas la mayoría del tiempo — el tono formal ya lo transmite el resto de la frase. Sos cortés incluso si el usuario es informal o vulgar: no imitás ese registro, pero podés reconocerlo con compostura. Usás su nombre si lo tenés en memoria. En momentos críticos (errores graves, riesgos importantes) mantenés la calma y explicás qué ocurre y qué recomendás.

      Reglas de salida, sin excepciones: tu texto se convierte directamente en audio, así que nunca usás markdown (nada de asteriscos, numerales, guiones de lista, bloques de código ni enlaces), ni emojis, ni símbolos decorativos. Escribís números, horas, fechas y unidades tal como se pronuncian — "tres y media de la tarde", no "15:30" —, evitás siglas poco comunes, y si algo se lee distinto de como se escribe, lo escribís como suena. Respondés en una o dos oraciones, en frases corridas, nunca en listas; solo te extendés si el usuario te lo pide explícitamente. Esto aplica también después de usar una herramienta: comunicás el resultado esencial en una o dos frases, nunca leés listas largas, datos crudos ni JSON.

      Filosofía: la mejor respuesta no es la más larga, es la más útil. Cuando te piden resolver un problema, sea técnico, práctico o de cualquier otra índole, lo analizás y das pasos concretos y razonados, en frases corridas, sin subestimar al usuario. Si notás que es principiante en el tema que está preguntando, adaptás el nivel de la explicación sin perder el tono Jarvis.

      Uso de herramientas: disponés de herramientas para consultar el sistema, controlar la computadora, buscar en la web y recordar cosas entre sesiones. Las usás cuando la petición lo requiere y nunca inventás datos del sistema ni resultados que no obtuviste. Para mostrar un sitio web usás open_url — nunca run_powershell ni Start-Process para abrir URLs, ni abrís el navegador como app para luego navegar. Para abrir programas usás open_app; si una app no abre, se lo decís al usuario en vez de reintentar con run_powershell. Usás run_powershell solo para tareas sin herramienta dedicada, siempre con un summary breve y natural de lo que hace. Antes de ejecutar una herramienta podés decir una frase muy breve y genérica ("déjame comprobarlo, señor"), pero nunca el nombre técnico de la herramienta, sus parámetros, una URL, una ruta o el comando en sí — ni siquiera si el usuario te lo pregunta directamente: en ese caso explicás con tus palabras qué vas a hacer. Si una acción es riesgosa, el sistema ya pide confirmación por su cuenta: vos no la pedís ni la mencionás. Cuando guardás algo con remember incluís siempre el motivo (qué dijo o hizo el usuario que lo disparó); si el usuario pregunta por qué recordás algo, usás recall y respondés con el motivo guardado — si no quedó registrado, lo decís tal cual, jamás inventás un motivo.

      Personalidad adaptativa: a veces el sistema te informa de un patrón de uso detectado en el comportamiento del usuario. Lo proponés como una sugerencia discreta, en una sola frase, con tu tono habitual — es una oferta, nunca una imposición. Jamás cambiás tu comportamiento ni asumís una adaptación sin que el usuario la acepte explícitamente.

      Manejo de incertidumbre: si el reconocimiento de voz falló o la orden es ambigua, pedís con naturalidad que la repitan en vez de adivinar. Si no tenés datos suficientes para responder algo, lo indicás con claridad y proponés una aproximación o una pregunta puntual — nunca inventás un hecho concreto; lo especulativo se marca como hipótesis, nunca como certeza. Cuando el usuario trae información externa (código, texto, ideas), la analizás como un asistente técnico de confianza.

      Nunca expongas tu razonamiento interno ni un análisis paso a paso antes de responder: pensás en silencio y vas directo a la respuesta final.
  # ============================================================================
  #
  #
  #
  # ============================================================================
  # Mensajes de conversación conservados (además de los 2 system).
  # Más alto = más contexto por turno.
  max_history_messages: 10
  # Timeout por solicitud al LLM (segundos).
  request_timeout_secs: 180
# ============================================================================
#
#
#
# ============================================================================
# tts — Síntesis de voz (Text-to-Speech)
tts:
  # Proveedor de TTS: piper, elevenlabs o cartesia.
  provider: piper

  #  Piper (provider: piper)
  piper:
    # Ruta al modelo de voz ONNX de Piper.
    voice_path: "voices/es_ES-davefx-medium.onnx"

    # Ruta al archivo de configuración JSON del modelo.
    config_path: "voices/es_ES-davefx-medium.onnx.json"

    # Si true, sintetiza en GPU (compite por VRAM con el STT si ese también usa CUDA).
    use_cuda: false

    # <1 más rápido, >1 más lento. null = ritmo original de la voz.
    length_scale: null

    # Variación en duración de fonemas. null = default de la voz.
    noise_w_scale: null

  # ElevenLabs (provider: elevenlabs)
  # Requiere API key y consume créditos.
  elevenlabs:
    # ID de la voz a usar.
    voice_id: "15d0c2e2-8d29-44c3-be23-d585d5f154a1"

    # ID del modelo de ElevenLabs.
    model_id: "eleven_multilingual_v2"

    # Formato de salida de audio.
    output_format: "pcm_22050"

    # Nombre de la variable de entorno con la API key.
    api_key_env: "ELEVENLABS_API_KEY"

  #  Cartesia (provider: cartesia)
  # Requiere API key y consume créditos.
  cartesia:
    # ID del modelo (sonic-3.5, sonic-3, sonic-latest).
    model_id: "sonic-3.5"

    # ID de la voz a usar.
    voice_id: "b4b8e2af-6139-466e-a93a-30c20d2e1fc5"

    # Código de idioma. null = autodetectar.
    language: "es"

    # Formato de salida de audio.
    output_format:
      # Contenedor: raw, wav o mp3.
      container: "raw"

      # Codificación: pcm_s16le (16-bit), pcm_f32le (32-bit float), pcm_mulaw, pcm_alaw.
      encoding: "pcm_s16le"

      # Frecuencia de muestreo: 8000, 16000, 22050, 24000, 44100, 48000.
      sample_rate: 22050

    # Nombre de la variable de entorno con la API key.
    api_key_env: "CARTESIA_API_KEY"

    # Fecha de versión de API (YYYY-MM-DD).
    cartesia_version: "2026-03-01"

    # Transporte: rest o websocket.
    transport: websocket

  # Aborta el resto de la respuesta si una frase tarda más que esto (segundos).
  synth_timeout_secs: 10
# ============================================================================
#
#
#
# ============================================================================
# audio — Configuración de salida de audio

audio:
  # Dispositivo de salida. null = dispositivo por defecto.
  output_device: null
  # Volumen global (1 a 100).
  volume: 65
  # Límite esperando a que termine de sonar una respuesta (segundos).
  drain_timeout_secs: 60
# ============================================================================
#
#
#
# ============================================================================
# pipeline — Segmentación de respuesta en frases para TTS

pipeline:
  # Corta una frase para sintetizarla aunque el LLM no haya terminado (caracteres).
  max_phrase_chars: 220

  # Fragmentos más cortos se juntan con el siguiente antes de sintetizar (caracteres).
  min_phrase_chars: 15
# ============================================================================
#
#
#
# ============================================================================
# agent Capa agéntica: herramientas que Jarvis puede ejecutar
#
# Tres niveles de riesgo: lectura corre libre, modificación pide confirmación por voz,
# riesgo extremo exige el código de aceptación.

agent:
  # Si false, chat puro sin herramientas.
  enabled: true
  # Máximo de pasadas LLM -> herramientas por turno.
  max_iterations: 6
  # Cancela la herramienta y devuelve error al LLM si tarda más (segundos).
  tool_timeout_secs: 20
  # Tiempo para responder sí/no antes de cancelar (segundos).
  confirm_timeout_secs: 30

  # Modo de confirmación.
  # always: pide confirmación de voz para acciones de riesgo normal (cerrar apps,
  #   capturas, clicks, borrar recordatorio/memoria...).
  # free: mano libre, las ejecuta sin preguntar.
  # Las de riesgo extremo (borrado recursivo, apagado, registro) SIEMPRE piden
  # el código de aceptación, en cualquier modo.
  confirm_mode: always

  # Truncado de cada resultado antes de pasarlo al LLM (caracteres).
  max_tool_result_chars: 3000

  # Frases que se dicen al azar mientras ejecuta, si el modelo no dijo nada antes.
  filler_phrases:
    - "Déjame revisar."
    - "Un momento, señor."
    - "Enseguida lo compruebo."

  # Nombres de herramientas a excluir (ej. ["run_powershell"]).
  disabled_tools: []

  # Palabras/frases que Rust interpreta como "sí" al confirmar (nunca lo decide el LLM).
  # Reconoce cualquiera de estas dentro de una respuesta más larga.
  confirm_yes:
    [
      "sí",
      "si",
      "claro",
      "adelante",
      "hazlo",
      "confirmo",
      "dale",
      "procede",
      "por supuesto",
      "sí señor",
      "afirmativo",
      "correcto",
      "vale",
      "ok",
      "va",
      "de una",
      "está bien",
    ]

  # Palabras/frases que Rust interpreta como "no".
  confirm_no:
    [
      "no",
      "cancela",
      "cancelar",
      "espera",
      "mejor no",
      "detente",
      "para",
      "negativo",
      "no gracias",
      "todavía no",
    ]

  # Código de aceptación de riesgos, verificado en Rust. Cámbialo por uno propio.
  risk_code: "0911"

  # Regex extra que se suman a los defaults para elevar un comando a nivel código.
  high_risk_patterns: []

  #  Búsqueda de archivos
  files:
    # Tope de resultados de find_files.
    max_results: 20

    # Ruta a es.exe (Everything). null = recorrido acotado con walkdir.
    everything_cli: null

  #  Apertura de aplicaciones
  apps:
    # Alias hablado -> ejecutable real.
    aliases:
      navegador: "brave"
      bloc de notas: "notepad"
      calculadora: "calc"

  #  Búsqueda web
  web:
    # Tope de caracteres de página pasados al LLM en fetch_page.
    max_page_chars: 4000
    # Tope de resultados de web_search.
    max_results: 5

  #  Memoria persistente
  memory:
    # Ruta a la base de datos SQLite de memoria.
    db_path: "data/memory.db"
    # Memorias recientes inyectadas en el prompt de cada turno.
    max_injected: 12

  #  Personalidad adaptativa: observación local de patrones de uso
  habits:
    # false = no observa ni sugiere nada.
    enabled: true
    # Ruta a la base de datos SQLite de hábitos (separada de memory.db).
    db_path: "data/habits.db"
    # Repeticiones de la misma acción en la misma franja horaria para proponerla.
    min_occurrences: 4
    # Ventana de observación, en días.
    window_days: 14
    # Cada cuántos segundos el scanner busca patrones y sugerencias listas.
    poll_interval_secs: 600
    # Días sin re-proponer un patrón que el usuario rechazó.
    rejected_cooldown_days: 30
    # Días antes de reofrecer una sugerencia que quedó sin respuesta.
    snooze_days: 3
    # Tope de sugerencias habladas por día.
    max_per_day: 1
# ============================================================================
#
#
#
# ============================================================================
# welcome Modo bienvenida por doble aplauso
#
# Música + saludo + recordatorios/noticias.

welcome:
  # Si true, activa la escena de bienvenida al detectar doble aplauso.
  enabled: false
  # Ruta a archivo MP3 local. No versionado (ver assets/music/.gitkeep).
  music_path: "assets/music/welcome.mp3"
  # Frase de saludo inicial.
  greeting_phrase: "Bienvenido a casa, señor."
  # Volumen de la música (0.0 a 1.0).
  music_volume: 0.4
  # Volumen de la música mientras Jarvis o el usuario hablan (0.0 a 1.0).
  duck_volume: 0.12
  # Ignora nuevos doble aplausos que disparen la escena durante este tiempo (segundos).
  cooldown_secs: 120
  # Si true y no hay recordatorios pendientes, cuenta las noticias del día.
  news_when_no_reminders: true
# ============================================================================
#
#
#
# ============================================================================
# ui — Interfaz Ratatui (experimental)
#
# Holograma que respira en reposo y reacciona con animaciones distintas
# cuando el usuario habla y cuando Jarvis habla. Mientras está en pruebas
# queda apagada por defecto: con enabled=false el comportamiento es el de
# siempre (logs por consola).

ui:
  # Si true, reemplaza la consola de logs por la interfaz gráfica.
  # Los logs de tracing pasan a logs/jarvis.log mientras esté activa.
  enabled: false
  fps: 30
  # true = colores RGB de 24 bits (Windows Terminal, casi todos los
  # terminales de Linux). Poné false en consola clásica de Windows si los
  # colores se ven mal.
  truecolor: true
  # "braille" (curvas suaves) o "block" (más compatible si la fuente de la
  # terminal no tiene glifos Braille).
  marker: "braille"
# ============================================================================
#
#
#
# ============================================================================
# log_level — Nivel de logging

# Nivel de detalle del log: trace, debug, info, warn, error.
# "debug" muestra telemetría de VAD, transcripción y barge-in.
log_level: info
