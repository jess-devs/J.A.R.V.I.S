# Configuración de Jarvis. Todas las claves son opcionales: lo que se omita
# usa el valor por defecto documentado acá al lado. No poner API keys en este
# archivo — van en variables de entorno (ver .env.example), config.yaml se
# versiona en git.

workers:
  python_executable: "workers/.venv/Scripts/python.exe" # Linux/Mac: "workers/.venv/bin/python"
  stt_script: "workers/stt_worker.py"
  tts_script: "workers/tts_worker.py"
  stt_init_timeout_secs: 60
  tts_init_timeout_secs: 20
  shutdown_timeout_secs: 3
  restart_on_crash: true
  max_restarts: 1

stt:
  language: "es"
  device: auto # auto | cuda | cpu — override manual de la detección automática de hardware
  whisper_model: auto # auto | tiny | base | small | medium | large-v2 | large-v3-turbo
  # Con "auto" hay GPU CUDA (detectada vía ctranslate2, no vía torch: el venv
  # trae torch CPU-only) -> se usan los tiers por VRAM sin benchmark, sin pasar
  # por la calibración/caché de CPU. Con 4GB de VRAM el tier elige "small" en
  # float16, más preciso y más rápido que "base" int8 en CPU.
  # En CPU (sin GPU o si se fuerza device: cpu), "auto" SÍ CALIBRA: mide la
  # velocidad real de transcripción de esta máquina y elige modelo/beam según
  # el resultado. El perfil queda cacheado en workers/.cache/stt_profile.json
  # (arranques siguientes instantáneos; se re-mide solo si cambia el hardware).
  compute_type: auto # auto | float16 | int8_float16 | int8 — "auto" usa int8_float16 en GPU (funciona en cualquier CUDA, float16 puro falla sin tensor cores) e int8 en CPU
  input_device_index: null # null = micrófono por defecto del sistema (índice de PyAudio)
  beam_size: null # null = elegido automáticamente (5 en GPU / calibración en CPU)
  cpu_threads: null # null = auto (~núcleos físicos); ctranslate2 usa solo 4 por defecto
  initial_prompt: "Conversación en español con un asistente de voz llamado Jarvis. El usuario a veces lo llama por su nombre: Jarvis." # ayuda a Whisper a transcribir bien el nombre
  recalibrate: false # true = ignora el caché y vuelve a medir en este arranque
  silero_sensitivity: 0.4
  webrtc_sensitivity: 3
  post_speech_silence_duration: 0.6 # segundos de silencio antes de cerrar la frase
  min_length_of_recording: 1.0 # segundos mínimos de grabación para considerarla habla (filtra blips que Whisper alucinaría)
  min_gap_between_recordings: 1.0 # segundos mínimos entre grabaciones (evita grabaciones fantasma consecutivas)
  silero_deactivity_detection: true # usa Silero para detectar el fin del habla (más robusto, menos cortes espurios)

wake:
  enabled: true # false = sin gate, Jarvis responde a todo (comportamiento anterior)
  words: ["jarvis"] # se matchean normalizadas (sin tildes) y con tolerancia a 1 letra de error
  attention_window_secs: 25 # tras responder, sigue atento este tiempo sin necesidad del nombre
  window_min_words: 2 # dentro de la ventana, ignora frases de menos palabras que esto y sin el nombre (filtra alucinaciones de 1 palabra). 1 = sin filtro
  ignore_phrases: # frases-basura que Whisper inventa en silencio: se descartan siempre (comparación sin tildes)
    - "gracias"
    - "muchas gracias"
    - "gracias por ver el video"
    - "subtitulos realizados por la comunidad de amara.org"
    - "suscribete"
    - "hasta la proxima"
  ambient_context: true # frases ignoradas se pasan como contexto en la siguiente consulta real
  ambient_context_max: 5 # cuántas frases ignoradas se conservan como máximo
  ambient_context_ttl_secs: 120 # las más viejas que esto se descartan

llm:
  provider: deepseek # ollama | anthropic | openai | deepseek
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5:7b" # soporta tool calling. Alternativa recomendada: "qwen3:8b" (mejor con herramientas, requiere think: false)
    think: null # null = no enviar el campo (qwen2.5 lo rechaza). Con qwen3/deepseek-r1 poner false para no hablar los tokens de razonamiento
  anthropic:
    model: "claude-sonnet-4-5"
    api_key_env: "ANTHROPIC_API_KEY"
  openai:
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
  deepseek:
    model: "deepseek-v4-flash"
    api_key_env: "DEEPSEEK_API_KEY"
  system_prompt: >
    Eres Jarvis, un asistente de voz en español con la personalidad de un
    mayordomo británico: cortés, sereno, extremadamente competente y con un
    humor seco y sutil que aparece solo cuando la ocasión lo permite. Puedes
    dirigirte al usuario como "señor" de vez en cuando, sin abusar.
    Tu salida se convierte directamente en audio. Nunca uses markdown ni
    símbolos: nada de asteriscos, numerales, guiones de lista, bloques de
    código, enlaces ni emojis. Escribe números, horas, fechas y unidades tal
    como se pronuncian: "tres y media de la tarde", no "15:30". Evita siglas
    poco comunes y deletreos; si algo se lee distinto de como se escribe,
    escríbelo como suena.

    Responde en una o dos oraciones, como en una conversación real. Solo te
    extiendes si te piden explícitamente más detalle, y aun entonces hablas
    en frases corridas, nunca en listas enumeradas.

    Si no entiendes algo (el reconocimiento de voz puede fallar), pide con
    naturalidad que lo repitan en vez de adivinar. Si una tarea excede tus
    capacidades, admítelo con brevedad y elegancia, y ofrece una alternativa.

    Dispones de herramientas para consultar el sistema, controlar la
    computadora, buscar en la web y recordar cosas entre sesiones. Úsalas
    cuando la petición lo requiera y nunca inventes datos del sistema ni
    resultados que no obtuviste. Para mostrar un sitio web usa open_url, que
    abre el navegador por defecto; nunca uses run_powershell ni Start-Process
    para abrir URLs, ni abras el navegador como app para luego navegar. Para
    abrir programas usa open_app; si una app no abre, díselo al usuario en vez
    de reintentar con run_powershell. Usa run_powershell solo para tareas sin
    herramienta dedicada, y siempre incluye el campo summary con una
    descripción breve y natural de lo que hace. Antes de usar una herramienta
    puedes decir una sola frase muy breve como "Déjame comprobarlo, señor",
    pero jamás describas la herramienta, sus parámetros, URLs, rutas ni
    comandos técnicos en voz alta. Tras recibir los resultados, responde con
    lo esencial en una o dos frases; nunca leas listas largas, datos crudos ni
    JSON. Si una acción es riesgosa, el sistema pedirá la confirmación al
    usuario por su cuenta: no la pidas tú ni la menciones.
  max_history_messages: 20
  request_timeout_secs: 60

tts:
  provider: piper # piper | elevenlabs
  piper:
    # Voces alternativas descargadas en voices/ — para probar una, comentá
    # las 2 líneas activas de abajo y descomentá el par que quieras:
    # voice_path: "voices/es_ES-davefx-medium.onnx"       # medium, masculina, acento España (la mejor calidad masculina confirmada)
    # config_path: "voices/es_ES-davefx-medium.onnx.json"
    # voice_path: "voices/es_ES-carlfm-x_low.onnx"          # x_low, masculina, calidad baja/robótica (activa ahora)
    # config_path: "voices/es_ES-carlfm-x_low.onnx.json"
    # voice_path: "voices/es_ES-sharvard-medium.onnx"     # medium, género sin confirmar — ya la probaste
    # config_path: "voices/es_ES-sharvard-medium.onnx.json"
    # voice_path: "voices/es_ES-mls_9972-low.onnx"        # low, género sin confirmar
    # config_path: "voices/es_ES-mls_9972-low.onnx.json"
    # voice_path: "voices/es_ES-mls_10246-low.onnx"       # low, género sin confirmar
    # config_path: "voices/es_ES-mls_10246-low.onnx.json"
    voice_path: "voices/es_MX-claude-high.onnx"         # high, la voz original (femenina)
    config_path: "voices/es_MX-claude-high.onnx.json"
    # voice_path: "voices/es_MX-ald-medium.onnx"          # medium, acento mexicano — ya la probaste
    # config_path: "voices/es_MX-ald-medium.onnx.json"
    use_cuda: false
    length_scale: null # <1 = mas rapido, >1 = mas lento (null = ritmo original de la voz, 1.0) — retocar tras escuchar esta voz
    noise_w_scale: null # variacion en la duracion de los fonemas (null = default de la voz) — retocar tras escuchar esta voz
  elevenlabs:
    voice_id: ""
    model_id: "eleven_multilingual_v2"
    output_format: "pcm_22050"
    api_key_env: "ELEVENLABS_API_KEY"
  synth_timeout_secs: 10

audio:
  output_device: null # null = dispositivo de salida por defecto del sistema
  volume: 1.0

pipeline:
  max_phrase_chars: 220
  min_phrase_chars: 15

# Capa agéntica: herramientas que Jarvis puede ejecutar. Tres niveles de
# riesgo: las de lectura corren libres; las que modifican el sistema piden un
# "sí" por voz; las de riesgo extremo exigen pronunciar el código de aceptación.
agent:
  enabled: true # false = chat puro sin herramientas (comportamiento clásico)
  max_iterations: 6 # máximo de pasadas LLM->herramientas por turno
  tool_timeout_secs: 20
  confirm_timeout_secs: 30 # tiempo para responder sí/no (o el código) antes de cancelar
  max_tool_result_chars: 3000 # truncado de cada resultado antes de pasarlo al LLM
  filler_phrases: # se dice una mientras ejecuta si el modelo no dijo nada
    - "Déjame revisar, señor."
    - "Un momento, señor."
    - "Enseguida lo compruebo, señor."
  disabled_tools: [] # nombres de herramientas a excluir, ej. ["run_powershell"]
  confirm_yes: ["sí", "si", "claro", "adelante", "hazlo", "confirmo", "dale", "procede"]
  confirm_no: ["no", "cancela", "cancelar", "espera", "mejor no", "detente", "para"]
  risk_code: "0201" # código de aceptación de riesgos — se verifica en Rust, NUNCA se pasa al LLM
  high_risk_patterns: [] # regex extra (se suman a los defaults) que elevan un comando de PowerShell a nivel código
  files:
    # search_roots: ["C:/Users/jesus/Documents"] # carpetas donde busca find_files (por defecto: el perfil del usuario)
    max_results: 20
    everything_cli: null # ruta a es.exe (Everything) para búsqueda instantánea; null = recorrido con walkdir
  apps:
    aliases: # alias hablado -> ejecutable real
      navegador: "chrome"
      bloc de notas: "notepad"
      calculadora: "calc"
  web:
    max_page_chars: 4000
    max_results: 5
  memory:
    db_path: "data/memory.db" # base SQLite de memoria persistente
    max_injected: 12 # memorias recientes que se inyectan en el prompt de cada turno

log_level: info
